<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비즈니스 제안 관리 | STUDIOMoW Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="admin-body">

<nav class="admin-nav">
  <div class="admin-logo">
    <span class="logo-studio">STUDIO</span><span class="logo-mow">MoW</span>
    <span style="font-family: var(--font-heading); font-size:11px; color:var(--gray); margin-left:12px; letter-spacing:0.1em;">ADMIN</span>
  </div>
  <div class="admin-nav-links"><a href="../index.html" target="_blank">사이트 보기 ↗</a></div>
  <button class="admin-logout" onclick="logout()">로그아웃</button>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-section">메인</div>
    <a href="index.html">📊 대시보드</a>
    <a href="talent.html">👥 인재 지원 관리</a>
    <a href="business.html" class="active">💼 비즈니스 제안 관리</a>
    <div class="admin-sidebar-section">설정</div>
    <a href="settings.html">⚙️ 사이트 설정</a>
    <a href="password.html">🔑 비밀번호 변경</a>
  </aside>

  <main class="admin-main">
    <div class="admin-page-title">비즈니스 제안 관리</div>
    <div class="admin-page-sub">접수된 비즈니스 제안을 검토하고 관리합니다</div>

    <div style="display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
      <select id="filterType" class="form-select" style="max-width:180px; padding:8px 12px; font-size:13px;" onchange="renderTable()">
        <option value="">전체 유형</option>
        <option value="investment">투자 제안</option>
        <option value="coproduction">공동 제작</option>
        <option value="distribution">배급 협력</option>
        <option value="ip_license">IP 라이선싱</option>
        <option value="mou">MOU</option>
        <option value="global">글로벌 파트너</option>
        <option value="other">기타</option>
      </select>
      <select id="filterStatus" class="form-select" style="max-width:160px; padding:8px 12px; font-size:13px;" onchange="renderTable()">
        <option value="">전체 상태</option>
        <option value="new">신규</option>
        <option value="review">검토중</option>
        <option value="approved">승인</option>
        <option value="rejected">보류</option>
      </select>
      <button class="admin-btn admin-btn-danger" onclick="clearAll()" style="margin-left:auto;">전체 삭제</button>
    </div>

    <div class="admin-card">
      <div class="admin-card-body" style="padding:0;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th><th>담당자</th><th>회사</th><th>제안 유형</th><th>규모</th><th>접수일</th><th>상태</th><th>액션</th>
            </tr>
          </thead>
          <tbody id="bizTableBody">
            <tr><td colspan="8" style="text-align:center; color:var(--gray); padding:48px;">접수된 제안이 없습니다</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; overflow-y:auto;">
      <div style="max-width:640px; margin:60px auto; padding:20px;">
        <div style="background:var(--dark2); border:1px solid var(--border); padding:36px; position:relative;">
          <button onclick="closeModal()" style="position:absolute; top:16px; right:16px; background:none; border:none; color:var(--white); font-size:20px; cursor:pointer;">✕</button>
          <div id="modalContent"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
if (sessionStorage.getItem('mow_admin') !== 'true') { window.location.href = 'login.html'; }
function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

const TYPE_LABELS = {
  investment:'투자 제안', coproduction:'공동 제작',
  distribution:'배급 협력', ip_license:'IP 라이선싱',
  mou:'MOU', global:'글로벌', other:'기타'
};
const SCALE_LABELS = {
  'under-3':'3억 미만','3-5':'3~5억','5-10':'5~10억',
  '10-15':'10~15억','15+':'15억↑','undecided':'미정'
};
const PROJECT_LABELS = {
  yeomgwi:'염귀', salgwiok:'살귀옥', dmz:'DMZ',
  mirrorhouse:'미러하우스', massacre:'대학살의 날', portfolio:'전체 포트폴리오'
};
const STATUS_INFO = {
  new:['badge-new','신규'], review:['badge-review','검토중'],
  approved:['badge-approved','승인'], rejected:['badge-rejected','보류']
};
function getData() { return JSON.parse(localStorage.getItem('biz_submissions')||'[]'); }
function saveData(d) { localStorage.setItem('biz_submissions', JSON.stringify(d)); }
function fmt(iso) { const d=new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }

function renderTable() {
  let data = getData();
  const type = document.getElementById('filterType').value;
  const st = document.getElementById('filterStatus').value;
  if (type) data = data.filter(d => d.biz_type === type);
  if (st) data = data.filter(d => d.status === st);

  const tbody = document.getElementById('bizTableBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:var(--gray); padding:48px;">접수된 제안이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((b, i) => `
    <tr>
      <td style="color:var(--gray); font-size:11px;">${i+1}</td>
      <td><strong>${b.biz_name||'-'}</strong></td>
      <td style="font-size:12px;">${b.biz_company||'-'}</td>
      <td>${TYPE_LABELS[b.biz_type]||b.biz_type||'-'}</td>
      <td style="font-size:12px;">${SCALE_LABELS[b.biz_scale]||'-'}</td>
      <td style="font-size:12px;">${fmt(b.date)}</td>
      <td><span class="badge ${STATUS_INFO[b.status]?.[0]||'badge-new'}">${STATUS_INFO[b.status]?.[1]||'신규'}</span></td>
      <td style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="admin-btn admin-btn-sm" onclick="showDetail(${b.id})">상세</button>
        <select class="form-select" style="font-size:11px; padding:4px 8px; min-width:70px;" onchange="updateStatus(${b.id}, this.value)">
          <option value="new" ${b.status==='new'?'selected':''}>신규</option>
          <option value="review" ${b.status==='review'?'selected':''}>검토중</option>
          <option value="approved" ${b.status==='approved'?'selected':''}>승인</option>
          <option value="rejected" ${b.status==='rejected'?'selected':''}>보류</option>
        </select>
        <button class="admin-btn admin-btn-danger" onclick="deleteItem(${b.id})">삭제</button>
      </td>
    </tr>
  `).join('');
}

function updateStatus(id, status) {
  const data = getData();
  const idx = data.findIndex(d => d.id === id);
  if (idx >= 0) { data[idx].status = status; saveData(data); }
  renderTable();
}
function deleteItem(id) {
  if (!confirm('이 제안서를 삭제하시겠습니까?')) return;
  saveData(getData().filter(d => d.id !== id));
  renderTable();
}
function clearAll() {
  if (!confirm('모든 비즈니스 제안 데이터를 삭제하시겠습니까?')) return;
  localStorage.removeItem('biz_submissions');
  renderTable();
}

function field(label, value) {
  return `<div><div style="font-size:10px; letter-spacing:0.15em; color:var(--gray); margin-bottom:4px; font-family:var(--font-heading); text-transform:uppercase;">${label}</div><div style="font-size:13px; color:var(--white);">${value||'-'}</div></div>`;
}

function showDetail(id) {
  const b = getData().find(d => d.id === id);
  if (!b) return;
  document.getElementById('modalContent').innerHTML = `
    <div style="margin-bottom:24px;">
      <div style="font-family:var(--font-heading); font-size:11px; letter-spacing:0.3em; color:var(--red); margin-bottom:6px;">비즈니스 제안 상세</div>
      <div style="font-size:24px; font-weight:700; color:var(--white);">${b.biz_name||'-'}</div>
      <div style="font-size:13px; color:var(--gray); margin-top:4px;">${b.biz_company||'-'} · ${TYPE_LABELS[b.biz_type]||b.biz_type} · ${fmt(b.date)}</div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;">
      ${field('이메일', b.biz_email)}
      ${field('연락처', b.biz_phone)}
      ${field('규모', SCALE_LABELS[b.biz_scale]||b.biz_scale)}
      ${field('관심 프로젝트', PROJECT_LABELS[b.biz_project]||b.biz_project||'전체')}
    </div>
    <div style="background:rgba(255,255,255,0.04); padding:20px; margin-bottom:20px;">
      <div style="font-size:11px; letter-spacing:0.2em; color:var(--gray); margin-bottom:10px; font-family:var(--font-heading); text-transform:uppercase;">제안 내용</div>
      <div style="font-size:14px; color:rgba(255,255,255,0.8); line-height:1.8; white-space:pre-wrap;">${b.biz_message||'-'}</div>
    </div>
    <div style="display:flex; gap:10px; flex-wrap:wrap;">
      <button class="admin-btn admin-btn-primary" onclick="updateStatus(${b.id},'approved');closeModal()">승인</button>
      <button class="admin-btn admin-btn-sm" onclick="updateStatus(${b.id},'review');closeModal()">검토중</button>
      <button class="admin-btn admin-btn-danger" onclick="updateStatus(${b.id},'rejected');closeModal()">보류</button>
      <a href="mailto:${b.biz_email}" class="admin-btn admin-btn-sm" style="text-align:center;">이메일 답장</a>
    </div>
  `;
  document.getElementById('detailModal').style.display = 'block';
}

function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
document.getElementById('detailModal').addEventListener('click', e => { if(e.target===document.getElementById('detailModal')) closeModal(); });

renderTable();
</script>
</body>
</html>
