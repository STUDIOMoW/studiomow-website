<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인재 지원 관리 | STUDIOMoW Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body class="admin-body">

<nav class="admin-nav">
  <div class="admin-logo">
    <span class="logo-studio">STUDIO</span><span class="logo-mow">MoW</span>
    <span style="font-family: var(--font-heading); font-size:11px; color:var(--gray); margin-left:12px; letter-spacing:0.1em;">ADMIN</span>
  </div>
  <div class="admin-nav-links">
    <a href="../index.html" target="_blank">사이트 보기 ↗</a>
  </div>
  <button class="admin-logout" onclick="logout()">로그아웃</button>
</nav>

<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-section">메인</div>
    <a href="index.html">📊 대시보드</a>
    <a href="talent.html" class="active">👥 인재 지원 관리</a>
    <a href="business.html">💼 비즈니스 제안 관리</a>
    <div class="admin-sidebar-section">설정</div>
    <a href="settings.html">⚙️ 사이트 설정</a>
    <a href="password.html">🔑 비밀번호 변경</a>
  </aside>

  <main class="admin-main">
    <div class="admin-page-title">인재 지원 관리</div>
    <div class="admin-page-sub">접수된 인재 지원서를 검토하고 관리합니다</div>

    <!-- Filters -->
    <div style="display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap;">
      <select id="filterCategory" class="form-select" style="max-width:180px; padding:8px 12px; font-size:13px;" onchange="renderTable()">
        <option value="">전체 분야</option>
        <option value="writer">작가</option>
        <option value="actor_m">배우(남)</option>
        <option value="actor_f">배우(여)</option>
        <option value="director">감독</option>
        <option value="dop">촬영감독</option>
        <option value="ad">조감독</option>
        <option value="art">미술감독</option>
        <option value="vfx">VFX</option>
        <option value="sound">음향</option>
        <option value="other">기타</option>
      </select>
      <select id="filterStatus" class="form-select" style="max-width:160px; padding:8px 12px; font-size:13px;" onchange="renderTable()">
        <option value="">전체 상태</option>
        <option value="new">신규</option>
        <option value="review">검토중</option>
        <option value="approved">승인</option>
        <option value="rejected">보류</option>
      </select>
      <button class="admin-btn admin-btn-danger" onclick="clearAll()" style="margin-left:auto;">전체 삭제</button>
    </div>

    <div class="admin-card">
      <div class="admin-card-body" style="padding:0;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>#</th>
              <th>이름</th>
              <th>분야</th>
              <th>이메일</th>
              <th>연락처</th>
              <th>경력</th>
              <th>접수일</th>
              <th>상태</th>
              <th>액션</th>
            </tr>
          </thead>
          <tbody id="talentTableBody">
            <tr><td colspan="9" style="text-align:center; color:var(--gray); padding:48px;">데이터 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Detail Modal -->
    <div id="detailModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:2000; overflow-y:auto;">
      <div style="max-width:640px; margin:60px auto; padding:20px;">
        <div style="background:var(--dark2); border:1px solid var(--border); padding:36px; position:relative;">
          <button onclick="closeModal()" style="position:absolute; top:16px; right:16px; background:none; border:none; color:var(--white); font-size:20px; cursor:pointer; font-family:var(--font-heading);">✕</button>
          <div id="modalContent"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
if (sessionStorage.getItem('mow_admin') !== 'true') { window.location.href = 'login.html'; }
function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

const CATEGORY_LABELS = {
  writer: '작가', actor_m: '배우(남)', actor_f: '배우(여)',
  director: '감독', dop: '촬영감독', ad: '조감독',
  art: '미술감독', vfx: 'VFX', sound: '음향', other: '기타'
};
const EXP_LABELS = {
  newcomer: '신인', '1-3': '1~3년', '4-7': '4~7년', '8-15': '8~15년', '15+': '15년↑'
};
const STATUS_INFO = {
  new: ['badge-new', '신규'],
  review: ['badge-review', '검토중'],
  approved: ['badge-approved', '승인'],
  rejected: ['badge-rejected', '보류']
};

function getData() { return JSON.parse(localStorage.getItem('talent_submissions') || '[]'); }
function saveData(d) { localStorage.setItem('talent_submissions', JSON.stringify(d)); }
function fmt(iso) { const d=new Date(iso); return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`; }

function renderTable() {
  const cat = document.getElementById('filterCategory').value;
  const st = document.getElementById('filterStatus').value;
  let data = getData();
  if (cat) data = data.filter(d => d.category === cat);
  if (st) data = data.filter(d => d.status === st);

  const tbody = document.getElementById('talentTableBody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center; color:var(--gray); padding:48px;">접수된 지원이 없습니다</td></tr>';
    return;
  }
  tbody.innerHTML = data.map((t, i) => `
    <tr>
      <td style="color:var(--gray); font-size:11px;">${i+1}</td>
      <td><strong>${t.name||'-'}</strong></td>
      <td>${CATEGORY_LABELS[t.category]||t.category||'-'}</td>
      <td style="font-size:12px;">${t.email||'-'}</td>
      <td style="font-size:12px;">${t.phone||'-'}</td>
      <td>${EXP_LABELS[t.experience]||t.experience||'-'}</td>
      <td style="font-size:12px;">${fmt(t.date)}</td>
      <td><span class="badge ${STATUS_INFO[t.status]?.[0]||'badge-new'}">${STATUS_INFO[t.status]?.[1]||'신규'}</span></td>
      <td style="display:flex; gap:6px; flex-wrap:wrap;">
        <button class="admin-btn admin-btn-sm" onclick="showDetail(${t.id})">상세</button>
        <select class="form-select" style="font-size:11px; padding:4px 8px; min-width:70px;" onchange="updateStatus(${t.id}, this.value)">
          <option value="new" ${t.status==='new'?'selected':''}>신규</option>
          <option value="review" ${t.status==='review'?'selected':''}>검토중</option>
          <option value="approved" ${t.status==='approved'?'selected':''}>승인</option>
          <option value="rejected" ${t.status==='rejected'?'selected':''}>보류</option>
        </select>
        <button class="admin-btn admin-btn-danger" onclick="deleteItem(${t.id})">삭제</button>
      </td>
    </tr>
  `).join('');
}

function updateStatus(id, status) {
  const data = getData();
  const idx = data.findIndex(d => d.id === id);
  if (idx >= 0) { data[idx].status = status; saveData(data); }

  // Send approval email notification (simulated)
  if (status === 'approved') {
    const item = data[idx];
    alert(`✓ ${item.name}님이 승인되었습니다.\n실제 배포 시 승인 알림이 finalblu@naver.com으로 자동 발송됩니다.`);
  }
  renderTable();
}

function deleteItem(id) {
  if (!confirm('이 지원서를 삭제하시겠습니까?')) return;
  const data = getData().filter(d => d.id !== id);
  saveData(data);
  renderTable();
}

function clearAll() {
  if (!confirm('모든 인재 지원 데이터를 삭제하시겠습니까? 복구할 수 없습니다.')) return;
  localStorage.removeItem('talent_submissions');
  renderTable();
}

function showDetail(id) {
  const data = getData();
  const t = data.find(d => d.id === id);
  if (!t) return;
  document.getElementById('modalContent').innerHTML = `
    <div style="margin-bottom:24px;">
      <div style="font-family:var(--font-heading); font-size:11px; letter-spacing:0.3em; color:var(--red); margin-bottom:6px;">인재 지원 상세</div>
      <div style="font-size:24px; font-weight:700; color:var(--white);">${t.name||'-'}</div>
      <div style="font-size:13px; color:var(--gray); margin-top:4px;">${CATEGORY_LABELS[t.category]||t.category} · ${fmt(t.date)} 접수</div>
    </div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;">
      ${field('이메일', t.email)}
      ${field('연락처', t.phone)}
      ${field('경력', EXP_LABELS[t.experience]||t.experience)}
      ${field('성별', t.gender||'미기재')}
    </div>
    ${t.portfolio_url ? `<div style="margin-bottom:16px;">${field('포트폴리오', `<a href="${t.portfolio_url}" target="_blank" style="color:var(--red);">${t.portfolio_url}</a>`)}</div>` : ''}
    <div style="background:rgba(255,255,255,0.04); padding:20px; margin-bottom:20px;">
      <div style="font-size:11px; letter-spacing:0.2em; color:var(--gray); margin-bottom:10px; font-family:var(--font-heading); text-transform:uppercase;">자기소개</div>
      <div style="font-size:14px; color:rgba(255,255,255,0.8); line-height:1.8; white-space:pre-wrap;">${t.intro||'-'}</div>
    </div>
    <div style="display:flex; gap:10px;">
      <button class="admin-btn admin-btn-primary" onclick="updateStatus(${t.id},'approved');closeModal()">승인</button>
      <button class="admin-btn admin-btn-sm" onclick="updateStatus(${t.id},'review');closeModal()">검토중</button>
      <button class="admin-btn admin-btn-danger" onclick="updateStatus(${t.id},'rejected');closeModal()">보류</button>
      <a href="mailto:${t.email}" class="admin-btn admin-btn-sm" style="text-align:center;">이메일 답장</a>
    </div>
  `;
  document.getElementById('detailModal').style.display = 'block';
}

function field(label, value) {
  return `<div><div style="font-size:10px; letter-spacing:0.15em; color:var(--gray); margin-bottom:4px; font-family:var(--font-heading); text-transform:uppercase;">${label}</div><div style="font-size:13px; color:var(--white);">${value||'-'}</div></div>`;
}

function closeModal() { document.getElementById('detailModal').style.display = 'none'; }
document.getElementById('detailModal').addEventListener('click', e => { if(e.target === document.getElementById('detailModal')) closeModal(); });

renderTable();
</script>
</body>
</html>
