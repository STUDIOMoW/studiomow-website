<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 | STUDIOMoW</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { background: #080808; }
  </style>
</head>
<body class="admin-body">

<div class="login-wrap">
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-studio">STUDIO</span><span class="logo-mow">MoW</span>
    </div>
    <div class="login-sub">ADMIN PANEL</div>

    <div id="loginError" class="alert alert-error" style="margin-bottom:16px; display:none;">
      아이디 또는 비밀번호가 올바르지 않습니다.
    </div>

    <form class="login-form" id="loginForm">
      <div class="form-group">
        <label class="form-label" for="admin_id">아이디</label>
        <input type="text" id="admin_id" name="admin_id" class="form-input" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="admin_pw">비밀번호</label>
        <input type="password" id="admin_pw" name="admin_pw" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-submit" style="margin-top:8px;">로그인</button>
    </form>

    <div style="margin-top:24px; padding:16px; background:rgba(192,57,43,0.1); border:1px solid rgba(192,57,43,0.2);">
      <div style="font-family: var(--font-heading); font-size:11px; letter-spacing:0.1em; color:var(--red); margin-bottom:8px;">초기 설정 안내</div>
      <div style="font-size:12px; color:var(--gray); line-height:1.8;">
        기본 아이디: <code style="color:var(--white)">admin</code><br>
        기본 비밀번호: <code style="color:var(--white)">studiomow2026!</code><br>
        <span style="color:rgba(255,255,255,0.35); font-size:11px;">※ 로그인 후 반드시 비밀번호를 변경하세요.</span>
      </div>
    </div>
  </div>
</div>

<script>
// Admin credentials stored in localStorage (in production: use server-side auth)
const DEFAULT_ADMIN = { id: 'admin', pw: 'studiomow2026!' };

// Initialize admin credentials if not set
if (!localStorage.getItem('admin_credentials')) {
  localStorage.setItem('admin_credentials', JSON.stringify(DEFAULT_ADMIN));
}

document.getElementById('loginForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const id = document.getElementById('admin_id').value;
  const pw = document.getElementById('admin_pw').value;
  const creds = JSON.parse(localStorage.getItem('admin_credentials') || '{}');
  const errEl = document.getElementById('loginError');

  if (id === creds.id && pw === creds.pw) {
    sessionStorage.setItem('mow_admin', 'true');
    sessionStorage.setItem('mow_admin_time', Date.now());
    window.location.href = 'index.html';
  } else {
    errEl.style.display = 'block';
    document.getElementById('admin_pw').value = '';
  }
});

// Already logged in?
if (sessionStorage.getItem('mow_admin') === 'true') {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
